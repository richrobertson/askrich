name = "askrich-dev-api"
main = "src/index.js"
compatibility_date = "2026-03-28"
workers_dev = true

[vars]
UPSTREAM_API_BASE = "http://127.0.0.1:8000"
ALLOWED_ORIGINS = "http://127.0.0.1:3000,http://localhost:3000"

[env.dev]
name = "askrich-dev-api"

[env.dev.vars]
UPSTREAM_API_BASE = "http://127.0.0.1:8000"
ALLOWED_ORIGINS = "http://127.0.0.1:3000,http://localhost:3000"

[env.staging]
name = "askrich-staging-api"

[env.staging.vars]
UPSTREAM_API_BASE = "https://staging-api.myrobertson.com"
ALLOWED_ORIGINS = "https://staging.myrobertson.com"

[env.prod]
name = "askrich-prod-api"

[env.prod.vars]
UPSTREAM_API_BASE = "https://internal-chat.myrobertson.com"
UPSTREAM_CHAT_PATH = "/v1/chat"
CHAT_BACKEND_MODE = "local"
ALLOWED_ORIGINS = "https://www.myrobertson.com"
