name = "askrich-dev-api"
main = "src/index.js"
compatibility_date = "2026-03-28"
workers_dev = true

[observability.logs]
enabled = true
invocation_logs = true

[vars]
UPSTREAM_API_BASE = "http://127.0.0.1:8000"
ALLOWED_ORIGINS = "http://127.0.0.1:3000,http://localhost:3000"
RATE_LIMIT_ENABLED = "true"
EVENT_LOGGING_ENABLED = "true"
RATE_LIMIT_QPS_HOUR = "30"
RATE_LIMIT_BURST_SECONDS = "1"
EVENT_TTL_DAYS = "90"

[env.dev]
name = "askrich-dev-api"

[[env.dev.kv_namespaces]]
binding = "EVENTS_KV"
# Replace with real KV namespace ID from: wrangler kv namespace create "askrich-events-dev"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[env.dev.vars]
UPSTREAM_API_BASE = "http://127.0.0.1:8000"
ALLOWED_ORIGINS = "http://127.0.0.1:3000,http://localhost:3000"
RATE_LIMIT_ENABLED = "true"
EVENT_LOGGING_ENABLED = "true"
RATE_LIMIT_QPS_HOUR = "30"
RATE_LIMIT_BURST_SECONDS = "1"
EVENT_TTL_DAYS = "90"

[env.staging]
name = "askrich-staging-api"

[[env.staging.kv_namespaces]]
binding = "EVENTS_KV"
# Replace with real KV namespace ID from: wrangler kv namespace create "askrich-events-staging"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[env.staging.vars]
UPSTREAM_API_BASE = "https://staging-api.myrobertson.com"
ALLOWED_ORIGINS = "https://staging.myrobertson.com"
RATE_LIMIT_ENABLED = "true"
EVENT_LOGGING_ENABLED = "true"
RATE_LIMIT_QPS_HOUR = "30"
RATE_LIMIT_BURST_SECONDS = "1"
EVENT_TTL_DAYS = "90"

[env.prod]
name = "askrich-prod-api"

[[env.prod.kv_namespaces]]
binding = "EVENTS_KV"
# Replace with real KV namespace ID from: wrangler kv namespace create "askrich-events-prod"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[env.prod.vars]
UPSTREAM_API_BASE = "https://api.myrobertson.com"
CHAT_BACKEND_MODE = "openai"
OPENAI_MODEL = "gpt-5.4"
ALLOWED_ORIGINS = "https://www.myrobertson.com,https://myrobertson.com"
RATE_LIMIT_ENABLED = "true"
EVENT_LOGGING_ENABLED = "true"
RATE_LIMIT_QPS_HOUR = "30"
RATE_LIMIT_BURST_SECONDS = "1"
EVENT_TTL_DAYS = "90"
