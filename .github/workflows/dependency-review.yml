name: Dependency Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Dependency review availability note
        if: failure()
        run: |
          echo "::notice::Dependency review requires the Dependency Graph to be enabled."
          echo "::notice::Enable it at: https://github.com/richrobertson/askrich/settings/security_analysis"
          echo "::notice::Once enabled, remove the continue-on-error flag from this workflow to enforce the check."
