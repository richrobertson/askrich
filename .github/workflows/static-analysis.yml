name: Static Analysis

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/static-analysis.yml'
      - 'apps/api/**'
      - 'scripts/**'
      - '.bandit'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - '.github/workflows/static-analysis.yml'
      - 'apps/api/**'
      - 'scripts/**'
      - '.bandit'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install ruff==0.6.9 bandit==1.7.10

      - name: Ruff lint
        run: ruff check apps/api scripts

      - name: Bandit security scan
        run: bandit -c .bandit -r apps/api scripts -ll -ii

  worker-js-static-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api/worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run worker static analysis
        run: npm run static:analysis
