name = "askrich-dev-api"
main = "src/index.js"
compatibility_date = "2026-03-28"
workers_dev = true

[observability.logs]
enabled = true
invocation_logs = true

[vars]
UPSTREAM_API_BASE = "http://127.0.0.1:8000"
ALLOWED_ORIGINS = "http://127.0.0.1:3000,http://localhost:3000"
RATE_LIMIT_ENABLED = "true"
EVENT_LOGGING_ENABLED = "true"
RATE_LIMIT_QPS_HOUR = "30"
RATE_LIMIT_BURST_SECONDS = "1"
EVENT_TTL_DAYS = "90"

[env.dev]
name = "askrich-dev-api"

[[env.dev.kv_namespaces]]
binding = "EVENTS_KV"
id = "e9d7573ab9554708924ab145164665a5"
preview_id = "562e06854d574356991234377e968883"

[env.dev.vars]
UPSTREAM_API_BASE = "http://127.0.0.1:8000"
ALLOWED_ORIGINS = "http://127.0.0.1:3000,http://localhost:3000"
RATE_LIMIT_ENABLED = "true"
EVENT_LOGGING_ENABLED = "true"
RATE_LIMIT_QPS_HOUR = "30"
RATE_LIMIT_BURST_SECONDS = "1"
EVENT_TTL_DAYS = "90"

[env.staging]
name = "askrich-staging-api"

[[env.staging.kv_namespaces]]
binding = "EVENTS_KV"
id = "6c2bd0e5ee5f4a1399cffe47c26fc79f"
preview_id = "b5ecfdc28e2049dc8dded2a83437cdcb"

[env.staging.vars]
UPSTREAM_API_BASE = "https://staging-api.myrobertson.com"
ALLOWED_ORIGINS = "https://staging.myrobertson.com"
RATE_LIMIT_ENABLED = "true"
EVENT_LOGGING_ENABLED = "true"
RATE_LIMIT_QPS_HOUR = "30"
RATE_LIMIT_BURST_SECONDS = "1"
EVENT_TTL_DAYS = "90"

[env.prod]
name = "askrich-prod-api"

[[env.prod.kv_namespaces]]
binding = "EVENTS_KV"
id = "b1d00665a03240e0803f74abba6b45f4"
preview_id = "93c5dd4461e3449fb9bb14956ce7c918"

[env.prod.vars]
UPSTREAM_API_BASE = "https://api.myrobertson.com"
CHAT_BACKEND_MODE = "openai"
